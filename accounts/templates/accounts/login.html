<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        body {
            margin: 0;
            background: #fafafa;
            font-family: Arial, sans-serif;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 350px;
            background: white;
            border: 1px solid #dbdbdb;
            padding: 32px 40px;
            text-align: center;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 36px;
            font-family: Georgia, serif;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            margin-bottom: 8px;
            padding: 9px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 9px;
            border: none;
            border-radius: 8px;
            background: #0095f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ed4956;
            font-size: 14px;
        }

        .link {
            display: block;
            margin-top: 18px;
            color: #0095f6;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="login-box">
        <h1>Instagram</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="text" name="login" placeholder="Логин или email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>

        <a href="{% url 'accounts:register' %}" class="link">Создать аккаунт</a>
    </div>
</div>
</body>
</html>
