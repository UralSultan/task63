<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body {
            margin: 0;
            background: #fafafa;
            font-family: Arial, sans-serif;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-box {
            width: 350px;
            background: white;
            border: 1px solid #dbdbdb;
            padding: 32px 40px;
            text-align: center;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 36px;
            font-family: Georgia, serif;
        }

        .form-row {
            margin-bottom: 10px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            color: #555;
        }

        input,
        textarea,
        select {
            box-sizing: border-box;
            width: 100%;
            padding: 9px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
        }

        button {
            width: 100%;
            margin-top: 12px;
            padding: 9px;
            border: none;
            border-radius: 8px;
            background: #0095f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .errorlist {
            margin: 4px 0 0;
            padding: 0;
            list-style: none;
            color: #ed4956;
            font-size: 12px;
        }

        .message {
            margin-bottom: 12px;
            color: #168a35;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="register-box">
        <h1>Instagram</h1>

        {% for message in messages %}
            <p class="message">{{ message }}</p>
        {% endfor %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-row">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</div>
</body>
</html>
