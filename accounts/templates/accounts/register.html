{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="page">
    <div class="box">
        <h1>Instagram</h1>

        {% for message in messages %}
            <p class="message">{{ message }}</p>
        {% endfor %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
                <div style="margin-bottom: 10px; text-align: left;">
                    <label for="{{ field.id_for_label }}" style="display: block; margin-bottom: 4px; font-size: 13px;">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit">Зарегистрироваться</button>
        </form>

        <a href="{% url 'accounts:login' %}" class="link">Уже есть аккаунт?</a>
    </div>
</div>
{% endblock %}
