{% extends 'base.html' %}

{% block title %}Публикации {{ profile_user.username }}{% endblock %}

{% block content %}
<div class="content">
    <h2>Публикации {{ profile_user.username }}</h2>

    <div class="post-list">
        {% for post in posts %}
            {% include 'posts/partial/post_card.html' %}
        {% empty %}
            <div class="profile-empty">
                <p>Публикаций пока нет.</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
