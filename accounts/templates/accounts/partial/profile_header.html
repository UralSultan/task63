<div class="profile-header">
    <div>
        <img src="{{ user.avatar.url }}" alt="{{ user.username }}" class="profile-avatar">
    </div>

    <div class="profile-info">
        <div class="profile-top">
            <h2 class="profile-name">{{ user.username }}</h2>
            <a href="{% url 'accounts:profile_edit' %}" class="edit-profile-link">Редактировать профиль</a>
        </div>

        <div class="profile-stats">
            <span><strong>{{ user.posts_count }}</strong> публикаций</span>
            <span><strong>{{ user.followers_count }}</strong> подписчиков</span>
            <span><strong>{{ user.following_count }}</strong> подписок</span>
        </div>

        {% if user.first_name %}
            <strong>{{ user.first_name }}</strong>
        {% endif %}

        {% if user.bio %}
            <div class="profile-bio">{{ user.bio|linebreaksbr }}</div>
        {% endif %}
    </div>
</div>
