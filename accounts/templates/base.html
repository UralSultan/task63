{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Instagram{% endblock %}</title>
    <style>
        body {
            margin: 0;
            background: #fafafa;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #dbdbdb;
        }

        .navbar-inner {
            max-width: 935px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            color: #262626;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo-image {
            height: 38px;
            display: block;
        }

        .nav-icon {
            width: 26px;
            height: 26px;
            display: block;
        }

        .logout-icon {
            width: 27px;
            height: 27px;
        }

        .search-form {
            width: 260px;
        }

        .search-form input {
            padding: 8px 12px;
            border-radius: 8px;
        }

        .page {
            min-height: calc(100vh - 58px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .box {
            width: 350px;
            background: white;
            border: 1px solid #dbdbdb;
            padding: 32px 40px;
            text-align: center;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 36px;
            font-family: Georgia, serif;
        }

        input,
        textarea,
        select {
            box-sizing: border-box;
            width: 100%;
            padding: 9px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 9px;
            border: none;
            border-radius: 8px;
            background: #0095f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .icon-button {
            width: auto;
            margin: 0;
            padding: 0;
            border: none;
            background: transparent;
            color: #262626;
            cursor: pointer;
        }

        .link {
            display: block;
            margin-top: 18px;
            color: #0095f6;
            text-decoration: none;
            font-size: 14px;
        }

        .error,
        .errorlist {
            color: #ed4956;
            font-size: 13px;
        }

        .errorlist {
            margin: 4px 0 0;
            padding: 0;
            list-style: none;
        }

        .message {
            margin-bottom: 12px;
            color: #168a35;
            font-size: 14px;
        }

        .content {
            max-width: 935px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .profile-header {
            display: flex;
            gap: 70px;
            align-items: center;
            padding-bottom: 40px;
            border-bottom: 1px solid #dbdbdb;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #dbdbdb;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            margin: 0 0 18px;
            font-size: 28px;
            font-family: Arial, sans-serif;
            font-weight: normal;
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .profile-top .profile-name {
            margin: 0;
        }

        .edit-profile-link {
            padding: 7px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            color: #262626;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .follow-button {
            padding: 8px 14px;
            border-radius: 8px;
            background: #0095f6;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .unfollow-button {
            padding: 8px 14px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            color: #262626;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 18px;
        }

        .profile-stats span {
            font-size: 16px;
        }

        .profile-bio {
            margin-top: 8px;
            line-height: 1.4;
        }

        .profile-empty {
            padding: 50px 0;
            text-align: center;
            color: #777;
        }

        .post-list {
            max-width: 470px;
            margin: 0 auto;
        }

        .profile-posts {
            max-width: 935px;
            margin: 30px auto 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .profile-posts .post-card {
            margin: 0;
            border: none;
        }

        .profile-posts .post-author,
        .profile-posts .post-body {
            display: none;
        }

        .profile-posts .post-image {
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .post-card {
            margin-bottom: 24px;
            background: white;
            border: 1px solid #dbdbdb;
        }

        .post-author {
            padding: 12px;
            font-weight: bold;
        }

        .post-image {
            width: 100%;
            display: block;
        }

        .post-body {
            padding: 12px;
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .like-button {
            font-size: 28px;
            line-height: 1;
        }

        .like-button.liked {
            color: #ed4956;
        }

        .post-description {
            margin: 8px 0;
        }

        .form-row {
            margin-bottom: 12px;
            text-align: left;
        }

        .form-section {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #dbdbdb;
        }

        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .user-list {
            max-width: 500px;
            margin: 0 auto;
        }

        .user-result {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            margin-bottom: 12px;
            background: white;
            border: 1px solid #dbdbdb;
            color: #262626;
            text-decoration: none;
        }

        .user-result img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a href="{% url 'accounts:index' %}" class="logo">
            <img src="{% static 'accounts/img/instagram-logo.png' %}" alt="Instagram" class="logo-image">
        </a>
        {% if request.user.is_authenticated %}
            <form action="{% url 'accounts:user_search' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="Поиск" value="{{ query|default:'' }}">
            </form>
        {% endif %}
        <div class="nav-links">
            {% if request.user.is_authenticated %}
                <a href="{% url 'posts:create' %}" title="Добавить публикацию">
                    <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                </a>
                <a href="{% url 'accounts:profile' %}" title="Профиль">
                    <img src="{% static 'accounts/img/profile-icon.png' %}" alt="Профиль" class="nav-icon">
                </a>
                <a href="{% url 'accounts:logout' %}" title="Выйти">
                    <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </a>
            {% else %}
                <a href="{% url 'accounts:login' %}">Войти</a>
                <a href="{% url 'accounts:register' %}">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

{% block content %}{% endblock %}
</body>
</html>
