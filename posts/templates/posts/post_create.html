{% extends 'base.html' %}

{% block title %}Новая публикация{% endblock %}

{% block content %}
<div class="page">
    <div class="box">
        <h1>Новая публикация</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-row">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit">Опубликовать</button>
        </form>
    </div>
</div>
{% endblock %}
